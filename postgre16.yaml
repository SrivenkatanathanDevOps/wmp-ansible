- name: Postgresql setup
  hosts: all
  become: yes
  tasks:
    - name: Import PostgreSQL GPG key
      ansible.builtin.rpm_key:
        state: present
        key: https://download.postgresql.org/pub/repos/yum/RPM-GPG-KEY-PGDG

    - name: Install postgresql repository
      ansible.builtin.dnf:
        name: https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
        state: present
        disable_gpg_check: no

    - name: Disable postgres default module
      ansible.builtin.shell: dnf -qy module disable postgresql

    - name: Install postgresql
      ansible.builtin.dnf:
        name:
          - "postgresql16-server"
          - "postgresql16"
        state: present

    - name: Initialize postgresql database
      ansible.builtin.shell: /usr/pgsql-16/bin/postgresql-16-setup initdb
      ignore_errors: yes

    - name: Update postgres listen address
      ansible.builtin.replace:
        path: /var/lib/pgsql/16/data/postgresql.conf
        regexp: "#listen_addresses = 'localhost'"
        replace: "listen_addresses = '*'"

    #  - name: Copy file with owner and permissions (Instead of updating here we're creating a file and copying it to the destination )
    #   ansible.builtin.copy:
    #      src: postgre.conf
    #      dest: /var/lib/pgsql/16/data/postgresql.conf

    - name: Updating pg_hba.conf file
      ansible.builtin.copy:
        src: pg_hba.conf
        dest: /var/lib/pgsql/16/data/pg_hba.conf

    - name: Starting postgresql service
      ansible.builtin.systemd_service:
        name: postgresql-16
        state: restarted
        enabled: true

    - name: Updating schema.sql file
      ansible.builtin.copy:
        src: schema.sql
        dest: /var/lib/pgsql/16/data/schema.sql

    - name: Load schema.sql file
      ansible.builtin.shell: sudo -u postgres /usr/pgsql-16/bin/psql < /tmp/schema.sql
